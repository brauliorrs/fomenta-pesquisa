name: Bot Editais

on:
  workflow_dispatch:
    inputs:
      publish_all_ready:
        description: "Publicar todos os itens prontos da fila nesta execucao manual"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 3,15 * * *"

concurrency:
  group: bot-editais
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          INSTAGRAM_PUBLISH_MODE: ${{ vars.INSTAGRAM_PUBLISH_MODE || 'mock' }}
          INSTAGRAM_DEFER_PUBLISH: "true"
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_API_HOST: ${{ vars.INSTAGRAM_API_HOST || 'https://graph.facebook.com' }}
          INSTAGRAM_API_VERSION: ${{ vars.INSTAGRAM_API_VERSION || 'v24.0' }}
          PUBLIC_ASSET_BASE_URL: ${{ vars.PUBLIC_ASSET_BASE_URL || '' }}
          INSTAGRAM_PUBLISH_TARGET: ${{ vars.INSTAGRAM_PUBLISH_TARGET || 'both' }}
          INSTAGRAM_REPOST_TARGET: ${{ vars.INSTAGRAM_REPOST_TARGET || 'story' }}
          INSTAGRAM_PUBLISH_STORIES: ${{ vars.INSTAGRAM_PUBLISH_STORIES || 'false' }}
          INSTAGRAM_MAX_NEW_PUBLICATIONS_PER_DAY: ${{ vars.INSTAGRAM_MAX_NEW_PUBLICATIONS_PER_DAY || '10' }}
          META_APP_ID: ${{ vars.META_APP_ID || '' }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          TIMEZONE: ${{ vars.TIMEZONE || 'America/Sao_Paulo' }}
        run: python -m src.main

      - name: Commit prepared assets
        id: commit_assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/editais.json data/fila_publicacao.json data/historico_postagens.csv logs/bot.log posts
          if git diff --cached --quiet; then
            echo "assets_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "update: editais $(date -u +'%Y-%m-%d %H:%M')"
          pushed=false
          for attempt in 1 2 3; do
            if git push; then
              pushed=true
              break
            fi
            git fetch origin main
            git pull --rebase origin main
          done
          test "$pushed" = "true"
          echo "assets_changed=true" >> "$GITHUB_OUTPUT"

      - name: Wait for public assets
        if: steps.commit_assets.outputs.assets_changed == 'true'
        env:
          PUBLIC_ASSET_BASE_URL: ${{ vars.PUBLIC_ASSET_BASE_URL || '' }}
        run: python -m src.wait_for_public_assets

      - name: Publish ready items
        env:
          INSTAGRAM_PUBLISH_MODE: ${{ vars.INSTAGRAM_PUBLISH_MODE || 'mock' }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_API_HOST: ${{ vars.INSTAGRAM_API_HOST || 'https://graph.facebook.com' }}
          INSTAGRAM_API_VERSION: ${{ vars.INSTAGRAM_API_VERSION || 'v24.0' }}
          PUBLIC_ASSET_BASE_URL: ${{ vars.PUBLIC_ASSET_BASE_URL || '' }}
          INSTAGRAM_PUBLISH_TARGET: ${{ vars.INSTAGRAM_PUBLISH_TARGET || 'both' }}
          INSTAGRAM_REPOST_TARGET: ${{ vars.INSTAGRAM_REPOST_TARGET || 'story' }}
          INSTAGRAM_PUBLISH_STORIES: ${{ vars.INSTAGRAM_PUBLISH_STORIES || 'false' }}
          INSTAGRAM_MAX_NEW_PUBLICATIONS_PER_DAY: ${{ vars.INSTAGRAM_MAX_NEW_PUBLICATIONS_PER_DAY || '10' }}
          META_APP_ID: ${{ vars.META_APP_ID || '' }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          TIMEZONE: ${{ vars.TIMEZONE || 'America/Sao_Paulo' }}
          INSTAGRAM_BOOTSTRAP_PUBLISH_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_all_ready && 'true' || 'false' }}
        run: python -m src.publish_pending

      - name: Commit publish results
        run: |
          git add data/editais.json data/fila_publicacao.json data/historico_postagens.csv logs/bot.log
          git diff --cached --quiet && exit 0
          git commit -m "publish: instagram $(date -u +'%Y-%m-%d %H:%M')"
          pushed=false
          for attempt in 1 2 3; do
            if git push; then
              pushed=true
              break
            fi
            git fetch origin main
            git pull --rebase origin main
          done
          test "$pushed" = "true"
